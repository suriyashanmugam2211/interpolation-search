<!DOCTYPE html>
<html>
<head>
    <title>Interpolation Search Analysis</title>
</head>
<body>
    <h2>Interpolation Search vs Binary Search</h2>

    <form method="POST">
        <input type="number" name="target" placeholder="Enter target number" required>
        <button type="submit">Search</button>
    </form>

    {% if result %}
    <hr>

    <h3>Interpolation Search</h3>
    <p>Index: {{ result.idx_i }}</p>
    <p>Comparisons: {{ result.comp_i }}</p>

    <h3>Binary Search</h3>
    <p>Index: {{ result.idx_b }}</p>
    <p>Comparisons: {{ result.comp_b }}</p>

    {% endif %}
</body>
</html>
